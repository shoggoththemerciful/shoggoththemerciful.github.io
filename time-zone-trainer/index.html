<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#eef4f1">
  <meta name="description" content="A fast time-zone conversion trainer for Bergen, UTC, New York, Pacific time, London, and market schedule times.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Time Zone Trainer</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #eef4f1;
      --panel: #fffaf0;
      --ink: #172026;
      --muted: #66716f;
      --line: #d3d9d2;
      --teal: #177c76;
      --teal-dark: #095a55;
      --coral: #df5f4e;
      --gold: #e0a82e;
      --blue: #2f6fbb;
      --shadow: 0 18px 55px rgba(23, 32, 38, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--paper);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(47, 111, 187, 0.1) 0 26%, transparent 27%),
        radial-gradient(circle at 86% 16%, rgba(224, 168, 46, 0.24) 0 10%, transparent 11%),
        var(--paper);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100vw - 28px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 44px;
      height: 44px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: var(--blue);
      box-shadow: 4px 4px 0 var(--ink);
      flex: 0 0 auto;
    }

    .mark svg {
      width: 30px;
      height: 30px;
      stroke: white;
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.35rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .record {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      min-height: 42px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      padding: 0 16px;
      background: var(--ink);
      color: #fffaf0;
      box-shadow: 3px 3px 0 rgba(23, 32, 38, 0.22);
      font-weight: 850;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .button.secondary {
      background: var(--panel);
      color: var(--ink);
    }

    .button:active,
    .segmented button:active {
      transform: translateY(1px);
    }

    .button:focus-visible,
    .segmented button:focus-visible,
    .answer:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(47, 111, 187, 0.18);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      align-items: stretch;
    }

    .workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(430px, 1fr);
      gap: 16px;
    }

    .controls,
    .panel,
    .sidebar {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: rgba(255, 250, 240, 0.94);
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(0, 0.75fr) auto;
      gap: 12px;
      align-items: center;
    }

    .label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .segmented {
      min-height: 40px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 3px;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 3px;
      background: #e6eee9;
    }

    .segmented button {
      min-width: 0;
      min-height: 32px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--ink);
      font-weight: 900;
      padding: 2px 6px;
      line-height: 1.1;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .segmented button.active {
      background: var(--teal);
      color: white;
    }

    .duration {
      width: 168px;
    }

    .duration .segmented {
      grid-template-columns: repeat(3, 1fr);
    }

    .panel {
      padding: clamp(16px, 4vw, 32px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
      overflow: hidden;
    }

    .timer-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .meter {
      height: 12px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      overflow: hidden;
      background: #e0e9e4;
    }

    .meter span {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--gold), var(--coral));
      transform-origin: left;
      transform: scaleX(1);
    }

    .time {
      width: 78px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 1.1rem;
      font-weight: 950;
    }

    .stage {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 18px;
      min-height: 300px;
      text-align: center;
    }

    .prompt {
      width: min(780px, 100%);
      min-height: 178px;
      border: 2px solid rgba(23, 32, 38, 0.18);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(47, 111, 187, 0.1), rgba(224, 168, 46, 0.16)),
        repeating-linear-gradient(0deg, transparent 0 34px, rgba(23, 32, 38, 0.055) 35px 36px);
      padding: clamp(16px, 4vw, 28px);
      display: grid;
      align-content: center;
      gap: 12px;
    }

    .prompt-type {
      color: var(--teal-dark);
      font-size: 0.82rem;
      font-weight: 950;
      text-transform: uppercase;
    }

    .prompt-main {
      font-size: clamp(2rem, 6vw, 4.9rem);
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .prompt-sub {
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.35;
      font-weight: 750;
    }

    .answer-wrap {
      width: min(430px, 100%);
      display: grid;
      gap: 9px;
    }

    .answer {
      width: 100%;
      min-height: 60px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      padding: 0 14px;
      font-size: 1.65rem;
      font-weight: 850;
      text-align: center;
      font-variant-numeric: tabular-nums;
      outline: none;
    }

    .answer:focus {
      box-shadow: 0 0 0 4px rgba(47, 111, 187, 0.18);
    }

    .unit {
      color: var(--muted);
      text-align: center;
      font-size: 0.84rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .feedback {
      min-height: 44px;
      color: var(--muted);
      font-weight: 850;
      line-height: 1.35;
    }

    .feedback.correct {
      color: var(--teal-dark);
    }

    .feedback.missed {
      color: var(--coral-dark);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      min-height: 72px;
      border-top: 2px solid var(--line);
      padding-top: 11px;
    }

    .stat strong {
      display: block;
      font-size: clamp(1.25rem, 3vw, 1.9rem);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .sidebar {
      min-width: 0;
      padding: 16px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
      overflow: hidden;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      line-height: 1.2;
    }

    .tiles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tile,
    .clock {
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fffdf7;
    }

    .tile {
      min-height: 82px;
    }

    .tile strong {
      display: block;
      font-size: 1.55rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .tile span,
    .clock span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .clocks {
      display: grid;
      gap: 8px;
    }

    .clock {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 58px;
    }

    .clock strong {
      font-size: 1rem;
      line-height: 1.1;
    }

    .clock b {
      font-size: 1.18rem;
      font-variant-numeric: tabular-nums;
    }

    .history {
      min-height: 180px;
      overflow: auto;
      border-top: 2px solid var(--line);
    }

    .history-row {
      display: grid;
      gap: 3px;
      min-height: 50px;
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
      font-size: 0.92rem;
    }

    .history-row strong {
      color: var(--teal-dark);
    }

    .history-row span {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.3;
    }

    .empty {
      color: var(--muted);
      padding: 16px 0;
      font-weight: 750;
    }

    @media (max-width: 940px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
      }

      .history-section {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100vw - 18px, 680px);
        padding: 10px 0 16px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: stretch;
      }

      .actions .button {
        flex: 1 1 120px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .duration {
        width: auto;
      }

      .panel {
        min-height: 500px;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .sidebar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 430px) {
      .segmented button {
        font-size: 0.84rem;
      }

      #modeGroup button {
        padding-inline: 3px;
        font-size: 0.72rem;
        overflow-wrap: normal;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <circle cx="16" cy="16" r="11"></circle>
            <path d="M16 8v8l5 4"></path>
            <path d="M5 16h4"></path>
            <path d="M23 16h4"></path>
          </svg>
        </div>
        <div>
          <h1>Time Zone Trainer</h1>
          <div class="record" id="recordLine">Best 0 in 60s</div>
        </div>
      </div>
      <div class="actions">
        <a class="button secondary" href="../">Tools</a>
        <button class="button" id="startBtn" type="button">Start</button>
        <button class="button secondary" id="resetBtn" type="button">Reset</button>
      </div>
    </header>

    <section class="layout" aria-label="Time zone practice">
      <div class="workspace">
        <section class="controls" aria-label="Session controls">
          <div>
            <span class="label">Drill</span>
            <div class="segmented" id="modeGroup" role="tablist" aria-label="Drill">
              <button type="button" class="active" data-mode="mix">Mix</button>
              <button type="button" data-mode="bergen">Bergen</button>
              <button type="button" data-mode="us">US</button>
              <button type="button" data-mode="utc">UTC</button>
              <button type="button" data-mode="markets">Markets</button>
            </div>
          </div>
          <div>
            <span class="label">Level</span>
            <div class="segmented" id="levelGroup" role="tablist" aria-label="Level">
              <button type="button" class="active" data-level="easy">Easy</button>
              <button type="button" data-level="medium">Medium</button>
              <button type="button" data-level="hard">Hard</button>
            </div>
          </div>
          <div class="duration">
            <span class="label">Time</span>
            <div class="segmented" id="durationGroup" role="tablist" aria-label="Time">
              <button type="button" class="active" data-duration="60">60</button>
              <button type="button" data-duration="120">120</button>
              <button type="button" data-duration="0">No limit</button>
            </div>
          </div>
        </section>

        <section class="panel" aria-live="polite">
          <div class="timer-row">
            <div class="meter" aria-hidden="true"><span id="meterFill"></span></div>
            <div class="time" id="timeLeft">60s</div>
          </div>

          <div class="stage">
            <div class="prompt">
              <div class="prompt-type" id="promptType">Bergen to market time</div>
              <div class="prompt-main" id="promptMain">Bergen 15:30</div>
              <div class="prompt-sub" id="promptSub">What time is it in New York?</div>
            </div>

            <form class="answer-wrap" id="answerForm" autocomplete="off">
              <input class="answer" id="answerInput" name="answer" inputmode="numeric" aria-label="Answer" placeholder="HH:MM or HHMM" autofocus>
              <div class="unit" id="answerUnit">24-hour time</div>
            </form>
            <div class="feedback" id="feedback">Type to start. Enter marks the current answer.</div>
          </div>

          <div class="stats" aria-label="Current stats">
            <div class="stat"><strong id="score">0</strong><span>Score</span></div>
            <div class="stat"><strong id="streak">0</strong><span>Streak</span></div>
            <div class="stat"><strong id="accuracy">100%</strong><span>Accuracy</span></div>
            <div class="stat"><strong id="pace">0.0</strong><span>Per Min</span></div>
          </div>
        </section>
      </div>

      <aside class="sidebar">
        <section>
          <h2>Today</h2>
          <div class="tiles">
            <div class="tile"><strong id="todayCorrect">0</strong><span>Correct</span></div>
            <div class="tile"><strong id="todayRounds">0</strong><span>Rounds</span></div>
          </div>
        </section>
        <section>
          <h2>Live Clocks</h2>
          <div class="clocks" id="clocks"></div>
        </section>
        <section class="history-section">
          <h2>Recent</h2>
          <div class="history" id="history"></div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const zones = {
      bergen: { label: "Bergen", zone: "Europe/Oslo" },
      utc: { label: "UTC", zone: "UTC" },
      ny: { label: "New York", zone: "America/New_York" },
      pt: { label: "PT", zone: "America/Los_Angeles" },
      london: { label: "London", zone: "Europe/London" },
      chicago: { label: "Chicago", zone: "America/Chicago" }
    };

    const state = {
      mode: "mix",
      level: "easy",
      duration: 60,
      active: false,
      startedAt: 0,
      endsAt: 0,
      score: 0,
      attempts: 0,
      streak: 0,
      current: null,
      timer: null,
      clockTimer: null,
      history: [],
      historyKey: "",
      store: loadStore()
    };

    const els = {
      startBtn: document.getElementById("startBtn"),
      resetBtn: document.getElementById("resetBtn"),
      answerForm: document.getElementById("answerForm"),
      answerInput: document.getElementById("answerInput"),
      promptType: document.getElementById("promptType"),
      promptMain: document.getElementById("promptMain"),
      promptSub: document.getElementById("promptSub"),
      answerUnit: document.getElementById("answerUnit"),
      feedback: document.getElementById("feedback"),
      meterFill: document.getElementById("meterFill"),
      timeLeft: document.getElementById("timeLeft"),
      score: document.getElementById("score"),
      streak: document.getElementById("streak"),
      accuracy: document.getElementById("accuracy"),
      pace: document.getElementById("pace"),
      todayCorrect: document.getElementById("todayCorrect"),
      todayRounds: document.getElementById("todayRounds"),
      recordLine: document.getElementById("recordLine"),
      clocks: document.getElementById("clocks"),
      history: document.getElementById("history")
    };

    const modes = ["bergen", "us", "utc", "markets"];
    const marketTimes = [
      { label: "NYSE open", zone: zones.ny, hour: 9, minute: 30 },
      { label: "NYSE close", zone: zones.ny, hour: 16, minute: 0 },
      { label: "Premarket starts", zone: zones.ny, hour: 4, minute: 0 },
      { label: "After-hours ends", zone: zones.ny, hour: 20, minute: 0 },
      { label: "Pacific 6:30", zone: zones.pt, hour: 6, minute: 30 },
      { label: "UTC midnight", zone: zones.utc, hour: 0, minute: 0 }
    ];

    wireSegments("modeGroup", "mode");
    wireSegments("levelGroup", "level");
    wireSegments("durationGroup", "duration");

    els.startBtn.addEventListener("click", startRound);
    els.resetBtn.addEventListener("click", resetRound);
    els.answerForm.addEventListener("submit", submitAnswer);
    els.answerInput.addEventListener("input", handleAnswerInput);
    document.addEventListener("keydown", handleGlobalKeydown);

    resetRound();
    renderStore();
    renderClocks();
    state.clockTimer = setInterval(renderClocks, 1000);

    function wireSegments(id, key) {
      document.getElementById(id).addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        [...button.parentElement.children].forEach((child) => child.classList.remove("active"));
        button.classList.add("active");
        state[key] = key === "duration" ? Number(button.dataset.duration) : button.dataset[key];
        resetRound();
      });
    }

    function startRound() {
      if (state.active) return;
      state.active = true;
      state.startedAt = Date.now();
      state.endsAt = state.duration ? state.startedAt + state.duration * 1000 : 0;
      state.score = 0;
      state.attempts = 0;
      state.streak = 0;
      state.history = [];
      state.historyKey = "";
      els.startBtn.textContent = "Running";
      els.startBtn.disabled = true;
      els.feedback.textContent = "Go";
      els.feedback.className = "feedback correct";
      if (!state.current) nextProblem();
      tick();
      clearInterval(state.timer);
      state.timer = setInterval(tick, 200);
      els.answerInput.focus();
      render();
    }

    function resetRound() {
      if (state.active && state.attempts > 0) saveRound();
      state.active = false;
      clearInterval(state.timer);
      state.timer = null;
      state.score = 0;
      state.attempts = 0;
      state.streak = 0;
      state.history = [];
      state.historyKey = "";
      state.current = makeProblem();
      els.answerInput.value = "";
      els.startBtn.textContent = "Start";
      els.startBtn.disabled = false;
      els.feedback.textContent = "Type to start. Use 24-hour time, e.g. 1530 or 15:30.";
      els.feedback.className = "feedback";
      renderProblem();
      render();
      updateTimer(state.duration || 0);
      els.answerInput.focus();
    }

    function submitAnswer(event) {
      event.preventDefault();
      if (!state.active) startRound();
      checkAnswer({ force: true });
    }

    function handleAnswerInput() {
      sanitizeAnswer();
      if (!state.active && hasAnswer()) startRound();
      checkAnswer({ force: false });
    }

    function checkAnswer({ force }) {
      if (!state.active || !hasAnswer()) return;
      const parsed = parseAnswer(els.answerInput.value);
      if (!parsed.complete && !force) return;
      if (parsed.minutes === null) return;
      const correct = parsed.minutes === state.current.answerMinutes;
      if (!correct && !force) return;
      recordAnswer(parsed.minutes, correct);
    }

    function recordAnswer(value, correct) {
      state.attempts += 1;
      if (correct) {
        state.score += 1;
        state.streak += 1;
        els.feedback.textContent = "Correct: " + state.current.answerDisplay;
        els.feedback.className = "feedback correct";
      } else {
        state.streak = 0;
        els.feedback.textContent = "Answer: " + state.current.answerDisplay + ". " + state.current.explanation;
        els.feedback.className = "feedback missed";
      }
      state.history.unshift({
        type: state.current.type,
        short: state.current.short,
        answer: state.current.answerDisplay,
        correct
      });
      state.history = state.history.slice(0, 10);
      els.answerInput.value = "";
      nextProblem();
      if (state.duration === 0) saveBestOnly();
      render();
    }

    function sanitizeAnswer() {
      const cleaned = els.answerInput.value
        .replace(/[^\d:apmAPM ]/g, "")
        .replace(/\s+/g, "");
      if (cleaned !== els.answerInput.value) els.answerInput.value = cleaned;
    }

    function hasAnswer() {
      return els.answerInput.value.trim() !== "";
    }

    function finishRound() {
      if (!state.active) return;
      state.active = false;
      clearInterval(state.timer);
      state.timer = null;
      els.startBtn.textContent = "Start";
      els.startBtn.disabled = false;
      els.feedback.textContent = "Done";
      els.feedback.className = "feedback";
      saveRound();
      render();
      updateTimer(0);
    }

    function saveRound() {
      const accuracy = getAccuracy();
      const today = todayKey();
      if (!state.store.days[today]) {
        state.store.days[today] = { correct: 0, rounds: 0 };
      }
      state.store.days[today].correct += state.score;
      state.store.days[today].rounds += 1;
      updateBest(accuracy);
      saveStore();
      renderStore();
    }

    function saveBestOnly() {
      updateBest(getAccuracy());
      saveStore();
      renderStore();
    }

    function updateBest(accuracy) {
      const beatsBest = state.score > state.store.best.score ||
        (state.score === state.store.best.score && accuracy > state.store.best.accuracy);
      if (!beatsBest) return;
      state.store.best = {
        score: state.score,
        accuracy,
        duration: state.duration,
        mode: state.mode,
        level: state.level
      };
    }

    function tick() {
      if (state.duration === 0) {
        updateTimer(0);
        render();
        return;
      }
      const remaining = Math.max(0, Math.ceil((state.endsAt - Date.now()) / 1000));
      updateTimer(remaining);
      if (remaining <= 0) finishRound();
      else render();
    }

    function updateTimer(seconds) {
      if (state.duration === 0) {
        if (els.timeLeft.textContent !== "No limit") els.timeLeft.textContent = "No limit";
        if (els.meterFill.style.transform !== "scaleX(1)") els.meterFill.style.transform = "scaleX(1)";
        return;
      }
      const label = seconds + "s";
      if (els.timeLeft.textContent !== label) els.timeLeft.textContent = label;
      const ratio = Math.max(0, Math.min(1, seconds / state.duration));
      const transform = "scaleX(" + ratio + ")";
      if (els.meterFill.style.transform !== transform) els.meterFill.style.transform = transform;
    }

    function nextProblem() {
      state.current = makeProblem();
      renderProblem();
    }

    function renderProblem() {
      els.promptType.textContent = state.current.type;
      els.promptMain.textContent = state.current.main;
      els.promptSub.textContent = state.current.sub;
      els.answerUnit.textContent = "Enter " + state.current.target.label + " time";
    }

    function makeProblem() {
      const mode = state.mode === "mix" ? pick(modes) : state.mode;
      if (mode === "markets") return makeMarketProblem();
      if (mode === "utc") return makeUtcProblem();
      if (mode === "us") return makeUsProblem();
      return makeBergenProblem();
    }

    function makeBergenProblem() {
      const targets = state.level === "easy" ? [zones.ny, zones.pt] : [zones.ny, zones.pt, zones.utc, zones.london, zones.chicago];
      return makeConversionProblem(zones.bergen, pick(targets), "Bergen to market time");
    }

    function makeUsProblem() {
      const pairs = [
        [zones.ny, zones.bergen],
        [zones.pt, zones.bergen],
        [zones.ny, zones.pt],
        [zones.pt, zones.ny]
      ];
      const pair = pick(state.level === "easy" ? pairs.slice(0, 2) : pairs);
      return makeConversionProblem(pair[0], pair[1], "US market time");
    }

    function makeUtcProblem() {
      const targets = state.level === "easy" ? [zones.bergen, zones.ny] : [zones.bergen, zones.ny, zones.pt, zones.london, zones.chicago];
      return makeConversionProblem(zones.utc, pick(targets), "UTC conversion");
    }

    function makeMarketProblem() {
      const event = pick(marketTimes);
      const target = pick(state.level === "easy" ? [zones.bergen] : [zones.bergen, zones.utc, zones.pt, zones.ny]);
      return makeConversionProblem(event.zone, target, "Market schedule", event.hour, event.minute, event.label);
    }

    function makeConversionProblem(source, target, type, fixedHour, fixedMinute, eventLabel) {
      const date = drillDate();
      const hour = fixedHour ?? randomHour();
      const minute = fixedMinute ?? randomMinute();
      const instant = zonedTimeToUtc(source.zone, date.year, date.month, date.day, hour, minute);
      const answer = getWallTime(instant, target.zone);
      const sourceDisplay = formatTime(hour, minute);
      const targetDisplay = formatTime(answer.hour, answer.minute);
      const shift = dayShift(instant, source.zone, target.zone);
      const dateLabel = formatDate(instant, source.zone);
      const main = (eventLabel ? eventLabel + ": " : "") + source.label + " " + sourceDisplay;
      return {
        type,
        main,
        sub: dateLabel + " - what time is it in " + target.label + "?",
        target,
        answerMinutes: answer.hour * 60 + answer.minute,
        answerDisplay: targetDisplay + (shift ? " (" + shift + ")" : ""),
        short: source.label + " " + sourceDisplay + " -> " + target.label,
        explanation: source.label + " " + sourceDisplay + " converts to " + target.label + " " + targetDisplay + (shift ? " " + shift : "")
      };
    }

    function drillDate() {
      const now = new Date();
      if (state.level !== "hard") {
        return {
          year: now.getUTCFullYear(),
          month: now.getUTCMonth() + 1,
          day: now.getUTCDate()
        };
      }
      const shifted = new Date(now.getTime() + rand(-180, 180) * 86400000);
      return {
        year: shifted.getUTCFullYear(),
        month: shifted.getUTCMonth() + 1,
        day: shifted.getUTCDate()
      };
    }

    function randomHour() {
      if (state.level === "easy") return pick([8, 9, 10, 12, 14, 15, 16, 18, 20, 21]);
      if (state.level === "medium") return pick([0, 4, 6, 8, 9, 10, 12, 14, 15, 16, 18, 20, 21, 22, 23]);
      return rand(0, 23);
    }

    function randomMinute() {
      if (state.level === "easy") return pick([0, 30]);
      if (state.level === "medium") return pick([0, 15, 30, 45]);
      return pick([0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55]);
    }

    function parseAnswer(input) {
      const raw = input.trim().toLowerCase();
      const ampm = raw.match(/^(\d{1,2})(?::?(\d{2}))?(am|pm)$/);
      if (ampm) {
        let hour = Number(ampm[1]);
        const minute = Number(ampm[2] || 0);
        if (hour < 1 || hour > 12 || minute > 59) return { minutes: null, complete: true };
        if (ampm[3] === "pm" && hour !== 12) hour += 12;
        if (ampm[3] === "am" && hour === 12) hour = 0;
        return { minutes: hour * 60 + minute, complete: true };
      }
      const colon = raw.match(/^(\d{1,2}):(\d{2})$/);
      if (colon) {
        const hour = Number(colon[1]);
        const minute = Number(colon[2]);
        if (hour > 23 || minute > 59) return { minutes: null, complete: true };
        return { minutes: hour * 60 + minute, complete: true };
      }
      const digits = raw.replace(/\D/g, "");
      if (digits.length === 3 || digits.length === 4) {
        const hour = Number(digits.slice(0, -2));
        const minute = Number(digits.slice(-2));
        if (hour > 23 || minute > 59) return { minutes: null, complete: true };
        return { minutes: hour * 60 + minute, complete: true };
      }
      return { minutes: null, complete: false };
    }

    function render() {
      const elapsed = state.active ? Math.max(1, (Date.now() - state.startedAt) / 1000) : 0;
      const perMinute = elapsed ? (state.score / elapsed) * 60 : 0;
      els.score.textContent = state.score;
      els.streak.textContent = state.streak;
      els.accuracy.textContent = getAccuracy() + "%";
      els.pace.textContent = perMinute.toFixed(1);
      renderHistory();
    }

    function renderHistory() {
      const key = state.history.map((item) => item.type + ":" + item.short + ":" + item.answer + ":" + item.correct).join("|") || "empty";
      if (key === state.historyKey) return;
      state.historyKey = key;
      if (state.history.length === 0) {
        els.history.innerHTML = '<div class="empty">No answers yet</div>';
        return;
      }
      els.history.innerHTML = state.history.map((item) => {
        const result = item.correct ? "hit" : "miss";
        return '<div class="history-row"><strong>' + item.type + ' - ' + result + '</strong><span>' + item.short + ' - ' + item.answer + '</span></div>';
      }).join("");
    }

    function renderStore() {
      const today = state.store.days[todayKey()] || { correct: 0, rounds: 0 };
      els.todayCorrect.textContent = today.correct;
      els.todayRounds.textContent = today.rounds;
      els.recordLine.textContent = "Best " + state.store.best.score + " in " + formatDuration(state.store.best.duration);
    }

    function renderClocks() {
      const now = new Date();
      els.clocks.innerHTML = [zones.bergen, zones.utc, zones.ny, zones.pt, zones.london, zones.chicago].map((item) => {
        return '<div class="clock"><div><strong>' + item.label + '</strong><span>' + offsetLabel(now, item.zone) + '</span></div><b>' + formatInZone(now, item.zone) + '</b></div>';
      }).join("");
    }

    function handleGlobalKeydown(event) {
      if (event.target === els.answerInput) return;
      if (/^[\d:]$/.test(event.key)) {
        event.preventDefault();
        els.answerInput.focus();
        els.answerInput.value += event.key;
        handleAnswerInput();
        return;
      }
      if (event.key === "Backspace") {
        event.preventDefault();
        els.answerInput.focus();
        els.answerInput.value = els.answerInput.value.slice(0, -1);
        handleAnswerInput();
      }
    }

    function getAccuracy() {
      if (!state.attempts) return 100;
      return Math.round((state.score / state.attempts) * 100);
    }

    function zonedTimeToUtc(zone, year, month, day, hour, minute) {
      const wallUtc = Date.UTC(year, month - 1, day, hour, minute);
      let guess = wallUtc;
      for (let i = 0; i < 4; i += 1) {
        guess = wallUtc - getOffsetMinutes(new Date(guess), zone) * 60000;
      }
      return new Date(guess);
    }

    function getOffsetMinutes(date, zone) {
      if (zone === "UTC") return 0;
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: zone,
        timeZoneName: "shortOffset"
      }).formatToParts(date);
      const name = parts.find((part) => part.type === "timeZoneName").value;
      const match = name.match(/GMT([+-])(\d{1,2})(?::(\d{2}))?/);
      if (!match) return 0;
      const sign = match[1] === "+" ? 1 : -1;
      return sign * (Number(match[2]) * 60 + Number(match[3] || 0));
    }

    function getWallTime(date, zone) {
      const parts = new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        hour: "2-digit",
        minute: "2-digit",
        hourCycle: "h23"
      }).formatToParts(date);
      return {
        hour: Number(parts.find((part) => part.type === "hour").value),
        minute: Number(parts.find((part) => part.type === "minute").value)
      };
    }

    function formatInZone(date, zone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        hour: "2-digit",
        minute: "2-digit",
        hourCycle: "h23"
      }).format(date);
    }

    function formatDate(date, zone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        month: "short",
        day: "numeric"
      }).format(date);
    }

    function dayNumber(date, zone) {
      const parts = new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(date);
      return Date.UTC(
        Number(parts.find((part) => part.type === "year").value),
        Number(parts.find((part) => part.type === "month").value) - 1,
        Number(parts.find((part) => part.type === "day").value)
      ) / 86400000;
    }

    function dayShift(date, sourceZone, targetZone) {
      const diff = dayNumber(date, targetZone) - dayNumber(date, sourceZone);
      if (diff > 0) return "next day";
      if (diff < 0) return "previous day";
      return "";
    }

    function offsetLabel(date, zone) {
      const minutes = getOffsetMinutes(date, zone);
      if (minutes === 0) return "UTC";
      const sign = minutes > 0 ? "+" : "-";
      const abs = Math.abs(minutes);
      const hours = Math.floor(abs / 60);
      const mins = abs % 60;
      return "UTC" + sign + hours + (mins ? ":" + String(mins).padStart(2, "0") : "");
    }

    function formatTime(hour, minute) {
      return String(hour).padStart(2, "0") + ":" + String(minute).padStart(2, "0");
    }

    function formatDuration(duration) {
      return duration ? duration + "s" : "untimed";
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pick(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function loadStore() {
      const fallback = {
        best: { score: 0, accuracy: 0, duration: 60, mode: "mix", level: "easy" },
        days: {}
      };
      try {
        return JSON.parse(localStorage.getItem("time-zone-trainer")) || fallback;
      } catch {
        return fallback;
      }
    }

    function saveStore() {
      localStorage.setItem("time-zone-trainer", JSON.stringify(state.store));
    }
  </script>
</body>
</html>
